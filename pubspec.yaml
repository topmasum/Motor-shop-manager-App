name: motorshop
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  firebase_core: ^4.9.0
  firebase_auth: ^6.5.1
  cloud_firestore: ^6.4.1
  google_fonts: ^8.1.0
  fl_chart: ^1.2.0
  intl: ^0.20.2
  screenshot: ^3.0.0
  share_plus: ^13.1.0
  path_provider: ^2.1.5
  url_launcher: ^6.3.2
  http: ^1.6.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  # Move the icon generator here! It's a development tool.
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true

  # Corrected asset folder syntax
  assets:
    - assets/images/

# FIXED: Pushed all the way to the left margin!
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/logo.png"
  min_sdk_android: 21